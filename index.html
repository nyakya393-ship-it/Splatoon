<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splatoon 分析アプリ</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #1a1a1a, #0a0a0a);
  color: #eaeaea;
  text-align: center;
  padding: 24px;
}

h1 {
  color: #00ffd5;
  text-shadow: 0 0 10px #00ffd5;
}

input, select {
  padding: 12px;
  margin: 6px;
  border-radius: 10px;
  border: none;
  background: #1f1f1f;
  color: #fff;
  outline: none;
}

button {
  padding: 12px 18px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #00ffd5, #00aaff);
  color: #000;
  font-weight: 800;
  cursor: pointer;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 14px;
  margin: 12px auto;
  border-radius: 14px;
  max-width: 420px;
  text-align: left;
  cursor: pointer;
}

.win { color: #00ff99; font-weight: bold; }
.lose { color: #ff4d4d; font-weight: bold; }

/* 詳細表示 */
.detail {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
}

.detail-card {
  background: #1f1f1f;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 400px;
  text-align: left;
}

.close-btn {
  float: right;
  background: #ff4d4d;
  color: #fff;
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>📊 Splatoon 分析アプリ</h1>

<input id="weapon" placeholder="ブキ">
<input id="stage" placeholder="ステージ">

<select id="rule">
  <option value="ナワバリ">ナワバリ</option>
  <option value="ガチエリア">ガチエリア</option>
  <option value="ガチヤグラ">ガチヤグラ</option>
  <option value="ガチホコ">ガチホコ</option>
  <option value="ガチアサリ">ガチアサリ</option>
</select>

<input id="kills" type="number" placeholder="キル">
<input id="deaths" type="number" placeholder="デス">
<input id="paint" type="number" placeholder="塗りポイント">

<select id="result">
  <option value="win">勝ち</option>
  <option value="lose">負け</option>
</select>

<input id="memo" placeholder="メモ">

<br>
<button onclick="addMatch()">追加</button>

<h2>📈 データ</h2>
<div id="stats"></div>

<h2>🧾 履歴</h2>
<div id="list"></div>

<!-- 詳細 -->
<div id="detail" class="detail">
  <div class="detail-card">
    <button class="close-btn" onclick="closeDetail()">×</button>
    <div id="detail-content"></div>
  </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("splatoon_data") || "[]");

function addMatch() {
  const weapon = document.getElementById("weapon").value || "不明";
  const stage = document.getElementById("stage").value || "不明";
  const rule = document.getElementById("rule").value;

  const k = Number(document.getElementById("kills").value);
  const d = Number(document.getElementById("deaths").value);
  const paint = Number(document.getElementById("paint").value) || 0;
  const r = document.getElementById("result").value;
  const memo = document.getElementById("memo").value || "";

  data.push({ weapon, stage, rule, k, d, paint, r, memo });

  localStorage.setItem("splatoon_data", JSON.stringify(data));

  render();
}

function render() {
  const list = document.getElementById("list");
  const stats = document.getElementById("stats");

  list.innerHTML = "";

  let win = 0;
  let killSum = 0;
  let deathSum = 0;

  data.forEach((m, i) => {
    if (m.r === "win") win++;

    killSum += m.k;
    deathSum += m.d;

    list.innerHTML += `
      <div class="card" onclick="showDetail(${i})">
        🎯 ${m.weapon} ｜ ${m.rule}<br>
        🗺️ ${m.stage}<br>
        🔫 ${m.k} / 💀 ${m.d}<br>
        🟢 塗り: ${m.paint}<br>
        <b class="${m.r}">${m.r}</b>
      </div>
    `;
  });

  let rate = data.length ? (win / data.length * 100).toFixed(1) : 0;
  let kd = deathSum ? (killSum / deathSum).toFixed(2) : killSum;

  stats.innerHTML = `
    <div class="card">
      総試合: ${data.length}<br>
      勝率: ${rate}%<br>
      K/D: ${kd}
    </div>
  `;
}

function showDetail(i) {
  const m = data[i];

  document.getElementById("detail-content").innerHTML = `
    <h3>📋 試合詳細</h3>
    🎯 ブキ：${m.weapon}<br>
    🗺️ ステージ：${m.stage}<br>
    🎮 ルール：${m.rule}<br><br>

    🔫 キル：${m.k}<br>
    💀 デス：${m.d}<br>
    🟢 塗り：${m.paint}<br><br>

    📊 結果：${m.r}<br><br>

    📝 メモ：${m.memo || "なし"}
  `;

  document.getElementById("detail").style.display = "flex";
}

function closeDetail() {
  document.getElementById("detail").style.display = "none";
}

render();
</script>

</body>
</html>
